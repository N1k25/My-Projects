<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Change Password Worktap</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/creating_contest-3.css">
    <link rel="stylesheet" href="../css/create_work-1.css">
    <link rel="stylesheet" href="../css/history.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/register.css">
</head>

<body>
    <div class="form-wrapper">
        <main class="form-side">
            <a href="#" title="Logo">
                <img src="../img/main/header/logo.png" alt="Worktap Logo" class="logo">
            </a>
            <form class="register-form">
                <div class="form-welcome-row">
                    <h2>Давайте восстановим Вам пароль</h2>
                    <h1>Придумайте новый пароль</h1>
                </div>
                <div class="text-field">
                    <label for="password" class="step--1__form-label">Пароль</label>
                    <input class="step--1__form-input" id="password" type="password" name="password" placeholder="Пароль"
                        title="Минимум 6 символов, как минимум 1 буква, 1 цифра и 1 символ."
                        pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[\W_])[A-Za-z\d\W_]{6,}$" required>
                    <div class="error-message">Минимум 6 символов, как минимум 1 буква, 1 цифра и 1 символ.</div>
                </div>
                <div class="text-field">
                    <label for="confirm_password" class="step--1__form-label">Повторите пароль</label>
                    <input class="step--1__form-input" id="confirm_password" type="password" name="confirm_password" placeholder="Пароль"
                        title="Минимум 6 символов, как минимум 1 буква, 1 цифра и 1 символ."
                        pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[\W_])[A-Za-z\d\W_]{6,}$" required>
                    <div class="error-message">Пароли не совпадают</div>
                </div>
                <button class="form__button my-form__button" type="button" onclick="window.location.href='../pages/login.html'">
                    Изменить пароль
                </button>
            </form>
        </main>
        <aside class="info-side">
            <div class="blockquote-wrapper">
                <blockquote>
                    Worktap — это маркетплейс фриланс услуг, где можно купить услугу как товар в магазине или создать индивидуальный заказ на бирже.
                </blockquote>
            </div>
            <div class="dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </aside>
    </div>
</body>
</html>
