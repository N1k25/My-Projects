<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reset Password Worktap</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/creating_contest-3.css">
    <link rel="stylesheet" href="./css/create_work-1.css">
    <link rel="stylesheet" href="./css/history.css">
    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="./css/register.css">
</head>

<body>
    <div class="form-wrapper">
        <main class="form-side">
            <a href="#" title="Logo">
                <img src="./img/header/logo.png" alt="Worktap Logo" class="logo">
            </a>
            <form class="register-form">
                <div class="form-welcome-row">
                    <h2>Мы отправим Вам код для восстановления пароля</h2>
                    <h1>Заполните поле ниже</h1>
                </div>
                <div class="text-field">
                    <label for="email" class="step--1__form-label">E-mail</label>
                    <input type="email" class="step--1__form-input" id="email" name="email" autocomplete="off" placeholder="E-mail"
                        required>
                    <div class="error-message">E-mail в неправильном формате</div>
                </div>
                <div class="text-field">
                    <label for="code" class="step--1__form-label">Код</label>
                    <input type="number" class="step--1__form-input" id="code" name="code" autocomplete="off" placeholder="Код из почты"
                        title="Введите код из вашего e-mail" required>
                    <div class="error-message">Введите код из вашего e-mail</div>
                </div>
                <button class="form__button my-form__button" type="button" onclick="window.location.href='./change_password.html'">
                    Отправить код
                </button>
                <div class="my-form__actions">
                    <div class="my-form__row">
                        <span>Вспомнили пароль?</span>
                        <a href="./login.html" title="Войдите в свой аккаунт">
                            Войдите
                        </a>
                    </div>
                </div>
            </form>
        </main>
        <aside class="info-side">
            <div class="blockquote-wrapper">
                <blockquote>
                    Worktap — это маркетплейс фриланс услуг, где можно купить услугу как товар в магазине или создать индивидуальный заказ на бирже.
                </blockquote>
            </div>
            <div class="dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </aside>
    </div>
</body>
</html>
